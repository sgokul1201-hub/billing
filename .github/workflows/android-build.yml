name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    name: Build Headless Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm ci || npm install

      - name: Setup Java JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Next.js Static Site
        run: npm run build

      - name: Debug Workspace and Run Doctor
        run: |
          echo "=== CLI Doctor ==="
          npx cap doctor
          echo "=== Root Directory ==="
          ls -la
          echo "=== Web Assets Directory ==="
          ls -la out || echo "out directory not found"

      - name: Sync Capacitor Android
        run: npx cap sync --verbose

      - name: Build Debug APK via Gradle Wrapper
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: sabari-billing-app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
